# Render 部署設定(Blueprint)— 多人連線伺服器
#
# 用途:把 server/index.mjs(WebSocket 轉發伺服器)部署到 Render,
# 取得一個公開的 wss:// 網址,讓網路上的朋友能連同一個世界。
#
# 怎麼用:
#  1. 到 https://render.com 註冊(免費,免信用卡)。
#  2. New + → Blueprint → 連到這個 GitHub repo,Render 會讀到這個檔案。
#  3. 部署完成後會得到網址,例如 https://archipelago-song-server.onrender.com
#     對應的 WebSocket 位址就是 wss://archipelago-song-server.onrender.com
#  4. 把那個 wss:// 位址設成 GitHub repo 變數 VITE_SERVER_URL(見 .github/workflows/deploy.yml 註解),
#     若服務名稱就叫 archipelago-song-server 則 deploy.yml 已有相同預設值,可省略。
#
# 注意:免費方案閒置約 15 分鐘會休眠,朋友第一個連線會觸發喚醒,需等約 30-50 秒。
services:
  - type: web
    name: archipelago-song-server
    runtime: node
    plan: free
    # 只需要 ws 套件;整包 npm ci 也行但較慢,這裡只裝正式相依即可
    buildCommand: npm ci --omit=dev
    startCommand: node server/index.mjs
    healthCheckPath: /
